# config.yaml
# Configuration file for Cosmos Validator Monitoring Bot.
#
# This file has two sections:
#   1. 'bot:' — Global bot settings (intervals, thresholds, admin users)
#   2. 'chains:' — Chain-specific configurations (API URLs, prefixes, etc.)
#
# Bot settings can also be overridden at runtime via /admin set commands.

bot:
  monitor_interval_seconds: 60
  governance_check_interval_seconds: 300
  upgrade_check_interval_seconds: 3600
  missed_blocks_threshold: 50
  min_stake_change_amount: 1000.0
  log_level: INFO
  log_file: bot.log
  db_path: validator_monitor.db
  api_timeout: 20.0
  api_max_retries: 3
  api_retry_backoff: 2.0
  admin_user_ids: []  # Add Discord user IDs that can manage the bot

chains:
  empe-testnet:
    rest_api_url: "https://empeiria-testnet-api.itrocket.net"
    valoper_prefix: "empevaloper"
    valcons_prefix: "empevalcons"
    token_symbol: "EMPE"
    base_denom: "uempe"
    decimals: 6
    missed_blocks_supported: true
    signing_infos_endpoint: "/cosmos/slashing/v1beta1/signing_infos?pagination.limit=500"
    slashing_params_endpoint: "/cosmos/slashing/v1beta1/params"
    gov_proposals_endpoint: "/cosmos/gov/v1beta1/proposals"
    current_plan_endpoint: "/cosmos/upgrade/v1beta1/current_plan"

  lumera-testnet:
    rest_api_url: "https://lumera-testnet-api.polkachu.com"
